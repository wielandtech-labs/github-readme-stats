name: Build self-host image

# Builds the self-hosted github-readme-stats container that powers
# stats.wielandtech.com and pushes it to GHCR. Flux image-automation in the
# homelab repo tracks the date-time-sha tag and bumps the Deployment.
#
# Runs on the shared homelab dind ARC runner pool (label homelab-dind),
# registered at the org level (wielandtech-labs) in w_homelab
# clusters/prod/infrastructure/github-runners/.

on:
  push:
    branches: [master]
    # Don't rebuild on doc-only or upstream-sync churn that can't change the image.
    paths-ignore:
      - "**.md"
      - "themes/**"
      - "docs/**"
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: homelab-dind
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx (remote buildkitd)
        uses: docker/setup-buildx-action@v3
        with:
          driver: remote
          endpoint: tcp://buildkitd.buildkit.svc.cluster.local:1234

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version vars
        id: vars
        run: |
          echo "date=$(date +'%Y%m%d')" >> "$GITHUB_OUTPUT"
          echo "time=$(date +'%H%M%S')" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/wielandtech-labs/github-readme-stats
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ steps.vars.outputs.date }}-${{ steps.vars.outputs.time }}-${{ steps.vars.outputs.sha }},enable=${{ github.event_name == 'push' }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Remote buildkitd handles its own layer + cache-mount persistence via
          # the PVC. No gha cache needed.
          cache-to: type=inline
